<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#C8A84B;--dark:#070709;--muted:#8888AA;--dim:#44445A;--white:#FAFAFE}
html,body{height:100%}
body{
  background:var(--dark);
  color:var(--white);
  font-family:'Space Mono',monospace;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  text-align:center;
  padding:40px 24px;
}
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse at 30% 50%, rgba(200,168,75,.04) 0%, transparent 60%),
    radial-gradient(ellipse at 70% 50%, rgba(200,168,75,.03) 0%, transparent 60%);
  pointer-events:none;
}
.mark{
  font-family:'Playfair Display',serif;
  font-size:clamp(48px,8vw,96px);
  font-weight:700;
  font-style:italic;
  color:rgba(200,168,75,.12);
  line-height:1;
  margin-bottom:48px;
  letter-spacing:-.02em;
}
.line{width:40px;height:1px;background:var(--gold);margin:0 auto 28px}
.name{
  font-family:'Playfair Display',serif;
  font-size:clamp(32px,5vw,56px);
  font-weight:700;
  color:var(--white);
  letter-spacing:-.02em;
  margin-bottom:12px;
}
.role{
  font-size:10px;
  letter-spacing:.25em;
  text-transform:uppercase;
  color:var(--gold);
  margin-bottom:8px;
}
.location{
  font-size:10px;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--dim);
  margin-bottom:48px;
}
.btn{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:13px 32px;
  background:var(--gold);
  color:var(--dark);
  font-family:'Space Mono',monospace;
  font-size:10px;
  letter-spacing:.2em;
  text-transform:uppercase;
  font-weight:700;
  text-decoration:none;
  border:2px solid var(--gold);
  transition:all .3s;
}
.btn:hover{background:transparent;color:var(--gold)}
.footer{
  position:fixed;
  bottom:24px;
  font-size:9px;
  letter-spacing:.14em;
  color:var(--dim);
}
</style>
